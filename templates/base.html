{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}General Food Industry Co., Ltd.{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}GFI — Import, export and distribution of food additives and ingredients.{% endblock %}">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- GFI brand styles -->
    <style>
        :root {
            --gfi-green:  #1A5C38;
            --gfi-gold:   #C9A227;
            --gfi-bg:     #F9F6F0;
            --gfi-text:   #2C2C2C;
            --gfi-gray:   #6B7280;
        }
        body {
            background-color: var(--gfi-bg);
            color: var(--gfi-text);
        }
        .navbar-gfi { background-color: var(--gfi-green); }
        .navbar-gfi .nav-link,
        .navbar-gfi .navbar-brand { color: #fff !important; }
        .navbar-gfi .nav-link:hover { color: var(--gfi-gold) !important; }
        .btn-gfi-primary {
            background-color: var(--gfi-green);
            color: #fff;
            border: none;
        }
        .btn-gfi-primary:hover {
            background-color: #154d2f;
            color: #fff;
        }
        .btn-gfi-gold {
            background-color: var(--gfi-gold);
            color: #fff;
            border: none;
        }
        .btn-gfi-gold:hover {
            background-color: #a8891f;
            color: #fff;
        }
        footer { background-color: var(--gfi-green); color: #fff; }
        footer a { color: var(--gfi-gold); text-decoration: none; }
        footer a:hover { color: #fff; }
    </style>

    {% block extra_head %}{% endblock %}

    <!-- Google Analytics GA4 -->
    {% if GA_TRACKING_ID %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ GA_TRACKING_ID }}"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ GA_TRACKING_ID }}');
    </script>
    {% endif %}
</head>
<body>
    {% include "includes/navbar.html" %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include "includes/footer.html" %}

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
